services:
  - type: web
    name: leaderboard-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leaderboard-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: leaderboard-db
    plan: free
    databaseName: leaderboard
    ipAllowList: []
